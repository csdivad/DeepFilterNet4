<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">df_mlx VAD head and soft mask flow</title>
  <desc id="desc">Diagram showing how df_mlx runs noisy audio through STFT, the DfNet4 encoder and backbone, then splits into ERB masking, deep filtering, and a VadHead whose sigmoid output becomes a soft VAD mask during inference and a BCE-with-logits training target during training.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" filterUnits="objectBoundingBox">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M1 1L11 6L1 11" stroke="#475569" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="760" rx="24" fill="url(#bg)"/>

  <text x="60" y="72" fill="#0F172A" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="34" font-weight="700">df_mlx VAD head and soft mask path</text>
  <text x="60" y="108" fill="#334155" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18">The code path is DfNet4 → VadHead → sigmoid gate. During training the same head is supervised with BCE-with-logits against the clean-signal VAD proxy.</text>

  <rect x="60" y="160" width="220" height="92" rx="20" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#shadow)"/>
  <text x="88" y="200" fill="#0F172A" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="700">Noisy audio</text>
  <text x="88" y="230" fill="#475569" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17">Waveform → STFT →</text>

  <rect x="340" y="145" width="320" height="124" rx="24" fill="#FFFFFF" stroke="#93C5FD" filter="url(#shadow)"/>
  <rect x="340" y="145" width="320" height="14" rx="24" fill="url(#accent)"/>
  <text x="370" y="194" fill="#0F172A" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="700">Encoder4 + backbone</text>
  <text x="370" y="226" fill="#334155" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17">ERB features + DF features → shared embedding</text>
  <text x="370" y="251" fill="#475569" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16">Backbone selectable in df_mlx: mamba, gru, or attention</text>

  <rect x="760" y="150" width="190" height="96" rx="20" fill="#FFFFFF" stroke="#A5B4FC" filter="url(#shadow)"/>
  <text x="790" y="192" fill="#0F172A" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="700">ErbDecoder4</text>
  <text x="790" y="221" fill="#475569" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16">ERB spectral mask</text>

  <rect x="760" y="278" width="190" height="96" rx="20" fill="#FFFFFF" stroke="#A5B4FC" filter="url(#shadow)"/>
  <text x="798" y="320" fill="#0F172A" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="700">DfDecoder4</text>
  <text x="780" y="349" fill="#475569" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16">Deep filtering / complex gain</text>

  <rect x="735" y="430" width="240" height="124" rx="24" fill="#FFFFFF" stroke="#F59E0B" filter="url(#shadow)"/>
  <rect x="735" y="430" width="240" height="14" rx="24" fill="#F59E0B"/>
  <text x="770" y="478" fill="#0F172A" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="700">VadHead</text>
  <text x="770" y="509" fill="#334155" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17">New multi-task VAD layer</text>
  <text x="770" y="535" fill="#475569" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16">Outputs raw logits from the shared embedding</text>

  <rect x="1010" y="442" width="140" height="100" rx="20" fill="#FFF7ED" stroke="#FDBA74" filter="url(#shadow)"/>
  <text x="1041" y="481" fill="#9A3412" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="700">sigmoid</text>
  <text x="1035" y="509" fill="#9A3412" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18">floor = 0.01</text>

  <rect x="930" y="150" width="220" height="224" rx="24" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#shadow)"/>
  <text x="962" y="190" fill="#0F172A" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="700">Enhanced spectrum</text>
  <text x="962" y="222" fill="#475569" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17">ERB mask + DF output are combined,</text>
  <text x="962" y="247" fill="#475569" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17">then the soft VAD mask attenuates</text>
  <text x="962" y="272" fill="#475569" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17">non-speech regions during inference.</text>
  <text x="962" y="322" fill="#0F172A" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="600">Inference gate</text>
  <text x="962" y="350" fill="#334155" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16">mx.maximum(mx.sigmoid(vad_logits), 0.01)</text>

  <rect x="60" y="474" width="250" height="154" rx="24" fill="#FFFFFF" stroke="#86EFAC" filter="url(#shadow)"/>
  <rect x="60" y="474" width="250" height="14" rx="24" fill="#22C55E"/>
  <text x="90" y="523" fill="#0F172A" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="25" font-weight="700">Clean reference</text>
  <text x="90" y="554" fill="#334155" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17">Speech-band energy proxy</text>
  <text x="90" y="580" fill="#475569" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16">p_ref from clean log-energy,</text>
  <text x="90" y="603" fill="#475569" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16">SNR gating, and z-scoring</text>

  <rect x="380" y="474" width="280" height="154" rx="24" fill="#FFFFFF" stroke="#86EFAC" filter="url(#shadow)"/>
  <text x="412" y="521" fill="#0F172A" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="700">Training supervision</text>
  <text x="412" y="553" fill="#334155" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17">1. Proxy VAD consistency loss</text>
  <text x="412" y="579" fill="#334155" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17">2. BCE-with-logits on VadHead</text>
  <text x="412" y="606" fill="#475569" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16">Targeted by the same clean-signal proxy</text>

  <line x1="280" y1="206" x2="340" y2="206" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="660" y1="206" x2="760" y2="198" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="660" y1="206" x2="760" y2="326" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="660" y1="206" x2="735" y2="492" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="950" y1="198" x2="930" y2="198" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="950" y1="326" x2="930" y2="326" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="975" y1="492" x2="1010" y2="492" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1080" y1="442" x2="1080" y2="374" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="310" y1="551" x2="380" y2="551" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="855" y1="554" x2="660" y2="554" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="735" y1="554" x2="660" y2="554" stroke="#475569" stroke-width="3"/>

  <text x="60" y="704" fill="#475569" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15">Code anchors: `DeepFilterNet/df_mlx/model.py` (`VadHead`, `DfNet4.__call__`, `StreamingDfNet4`) and `DeepFilterNet/df_mlx/training_losses.py` / `train_dynamic.py`.</text>
</svg>
