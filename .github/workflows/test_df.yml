name: Test DF

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_run:
    workflows: ["publish-pypi-wheels"]
    branches: [main]
    types:
      - completed
  schedule:
    - cron: '0 18 * * 0'

jobs:
  test-df-output:
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.os == 'windows-latest' }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(github.event_name == 'pull_request' && '[{"os":"ubuntu-latest"}]' || '[{"os":"ubuntu-latest"},{"os":"windows-latest"}]') }}
        # - os: "macos-latest"  # Fails to install hdf5 from git
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      # Free up disk space on ubuntu for PyTorch installation
      - name: Free disk space
        if: runner.os == 'Linux'
        run: |
          echo "Disk space before cleanup:"
          df -h /
          # Remove large unnecessary packages
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          echo "Disk space after cleanup:"
          df -h /
      - name: Echo git tag
        run: |
          echo "git tag: ${{github.event.head_commit.message}}"
          echo "git tag: ${{github.event.commits[0].message}}"
          echo "DF version:  $(scripts/get_version.sh)"
          echo "DF_VERSION=$(scripts/get_version.sh)" >> $GITHUB_ENV
      - name: should it be skipped?
        env:
          COMMIT_FILTER: '^v[0-9]+.[0-9]+.[0-9]+$'
        run: |
          readonly local last_commit_log=$(git log -1 --pretty=format:"%s")
          echo "last commit log: $last_commit_log"
          readonly local filter_count=$(echo "$last_commit_log" | grep -E -c "$COMMIT_FILTER" )
          if ! [[ "$filter_count" -eq 0 ]]; then
            echo "the last commit log \"$last_commit_log\" contains \"$COMMIT_FILTER\", stopping"
            exit 78
          fi
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.13.1
        with:
          access_token: ${{ github.token }}
      - name: Cleanup runner disk (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          echo "Disk usage before cleanup:"
          df -h .
          echo "Removing runner caches and old build artifacts"
          rm -rf ~/.cache/pip ~/.cache/pypoetry ~/.cache/torch ~/.cache/torch_extensions ~/.cache/DeepFilterNet || true
          rm -rf ~/.cargo/registry ~/.cargo/git || true
          rm -rf target DeepFilterNet/target || true
          rm -rf .venv DeepFilterNet/.venv || true
          if [[ "${RUNNER_ENVIRONMENT:-}" == "github-hosted" ]]; then
            echo "Removing preinstalled toolchains"
            sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost || true
          fi
          echo "Disk usage after cleanup:"
          df -h .
      - name: Cleanup runner disk (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "Disk usage before cleanup:"
          Get-PSDrive -PSProvider FileSystem
          $paths = @(
            "$env:LOCALAPPDATA\pip\Cache",
            "$env:LOCALAPPDATA\pypoetry\Cache",
            "$env:LOCALAPPDATA\torch",
            "$env:USERPROFILE\.cache\torch",
            "$env:USERPROFILE\.cargo\registry",
            "$env:USERPROFILE\.cargo\git",
            "$env:TEMP\*",
            "target",
            "DeepFilterNet\target",
            ".venv",
            "DeepFilterNet\.venv"
          )
          foreach ($p in $paths) {
            if (Test-Path $p) {
              Write-Host "Removing $p"
              Remove-Item -Recurse -Force $p -ErrorAction SilentlyContinue
            }
          }
          Write-Host "Disk usage after cleanup:"
          Get-PSDrive -PSProvider FileSystem
      # Rust installation
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libhdf5-dev pkg-config portaudio19-dev
          echo "HDF5_DIR=/usr/lib/x86_64-linux-gnu/hdf5/serial" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/lib/x86_64-linux-gnu/hdf5/serial/lib/pkgconfig" >> $GITHUB_ENV

      # Python install
      - name: Install Python
        uses: actions/setup-python@v6
        with:
          cache: 'pip'
          cache-dependency-path: '**/pyproject.toml'
          python-version: "3.10"
      - name: Create virtualenv and install maturin
        run: |
          python -m venv .venv
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            source .venv/Scripts/activate
            echo "$PWD/.venv/Scripts" >> $GITHUB_PATH
          else
            source .venv/bin/activate
            echo "$PWD/.venv/bin" >> $GITHUB_PATH
          fi
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install 'maturin>=1.3,<1.5'

      - name: Build pyDF (deepfilterlib) via maturin
        run: |
          maturin develop --release -m pyDF/Cargo.toml

      # Install DeepFilterNet and dependencies
      - name: Install runtime dependencies and DeepFilterNet
        if: matrix.os != 'windows-latest'
        working-directory: DeepFilterNet
        run: |
          python -m pip install --no-deps -e .
          python -m pip install \
            'numpy>=1.22,<2.0' 'loguru>=0.5' 'appdirs>=1.4,<2' 'requests>=2.27,<3' \
            'packaging>=23,<27' 'sympy>=1.6' 'librosa>=0.11.0,<0.12.0' pandas \
            'huggingface_hub>=0.20.0' tqdm h5py ptflops 'pyaudio>=0.2.14,<0.3.0' \
            'pystoi>=0.3,<0.5' 'pesq>=0.0.3,<0.0.5' 'scipy>=1,<2' 'soundfile>=0.10,<0.14' \
            'onnxruntime>=1.15,<1.24' 'tomli>=2.0' \
            torch torchaudio --extra-index-url https://download.pytorch.org/whl/cpu
          python -m pip install -r requirements_dnsmos.txt

      # Run tests (Python tests require the Linux/macOS install step above)
      - name: Run DF Test
        if: matrix.os != 'windows-latest'
        working-directory: DeepFilterNet
        run: |
          python -m df.scripts.test_df

      - name: Test python deepFilter script
        if: matrix.os != 'windows-latest'
        working-directory: DeepFilterNet
        run: |
          mkdir ../out
          python -m df.enhance --version
          python -m df.enhance --no-delay-compensation ../assets/noisy_snr0.wav -m DeepFilterNet -o ../out
          python -m df.enhance --no-delay-compensation ../assets/noisy_snr0.wav -m DeepFilterNet2 -o ../out
          python -m df.enhance --no-delay-compensation ../assets/noisy_snr0.wav -m DeepFilterNet3 -o ../out
          python df/scripts/dnsmos_dns5.py eval-sample ../assets/noisy_snr0.wav -t 3.604316132288559 2.682694789493083 2.58449544791776 2.981942
          python df/scripts/dnsmos_dns5.py eval-sample ../out/noisy_snr0_DeepFilterNet.wav -t 3.347275035532741 4.0226200060870045 3.0721500373065647 3.6992884
          python df/scripts/dnsmos_dns5.py eval-sample ../out/noisy_snr0_DeepFilterNet2.wav -t 3.356522067484457 4.094995405584476 3.1071521784172025 3.737621
          python df/scripts/dnsmos_dns5.py eval-sample ../out/noisy_snr0_DeepFilterNet3.wav -t 3.4399468223627174 4.144957235621709 3.2074756563112996 3.7088842

      - name: Test rust deep-filter script
        run: |
          cargo run -p deep_filter --profile=release --features=tract,bin,wav-utils,transforms --bin deep-filter -- ./assets/noisy_snr0.wav -m ./models/DeepFilterNet3_onnx.tar.gz -o out_DeepFilterNet3 -vvvv
      - name: Evaluate rust deep-filter output
        if: matrix.os != 'windows-latest'
        working-directory: DeepFilterNet
        run: |
          python df/scripts/dnsmos_dns5.py eval-sample ../out_DeepFilterNet3/noisy_snr0.wav -t 3.385834652850639 4.130096419832765 3.153399733642353 3.594115

      - uses: actions/upload-artifact@v4
        with:
          name: enhanced-${{ runner.os }}
          path: out/*wav
