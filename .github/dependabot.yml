version: 2
updates:
  - package-ecosystem: "cargo"
    directories:
      - "/"
      - "/demo/"
      - "/ladspa/"
      - "/libDF/"
      - "/pyDF-augment/"
      - "/pyDF-data/"
      - "/pyDF/"
    schedule:
      interval: "daily"
    groups:
      tract:
        applies-to: version-updates
        patterns:
          - "@tract*"
  - package-ecosystem: "pip"
    directory: "/DeepFilterNet/"
    schedule:
      interval: "daily"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

