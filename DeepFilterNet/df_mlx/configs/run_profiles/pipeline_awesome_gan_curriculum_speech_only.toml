# Speech-only suppression profile (recommended)
#
# Purpose:
#   Enhance target speech while aggressively suppressing non-target audio
#   (music + competing speech), using the tuned curriculum/GAN balance.
#
# Derived from:
#   - pipeline_awesome_gan_curriculum_adj.toml
#   - monitoring/rollback rubric in docs/LOSS_LANDSCAPE_ANALYSIS.md
#
# Usage:
#   python -m df_mlx.train_dynamic \
#     --run-config DeepFilterNet/df_mlx/configs/run_profiles/pipeline_awesome_gan_curriculum_speech_only.toml

[dataset]
cache_dir = "~/DataDump/datasets/mlx_datastore_cleaned"

[training]
epochs = 220
batch_size = 24
learning_rate = 1e-4
learning_rate_min = 1e-7
weight_decay = 0.0
warmup_epochs = 5
patience = 0
grad_accumulation_steps = 2
max_grad_norm = 1.0
fp16 = true
seed = 42

[dataloader]
num_workers = 8
prefetch_size = 16
use_mlx_data = true

[checkpoint]
checkpoint_dir = "./checkpoints/gan_curriculum_speech_only"
save_strategy = "epoch"
save_total_limit = 3
validate_every = 1
checkpoint_batches = 300
check_chkpts = false
resume = true
resume_data = true

[model]
backbone_type = "attention"
variant = "full"

[loss]
dynamic_loss = "pipeline_awesome"

[[loss.pipeline_stages]]
start_epoch = 0
name = "foundation"
awesome_loss_weight = 0.15
vad_loss_weight = 0.08
vad_speech_loss_weight = 0.05

[[loss.pipeline_stages]]
start_epoch = 60
name = "ramp"
awesome_loss_weight = 0.45
vad_loss_weight = 0.20
vad_speech_loss_weight = 0.15

[[loss.pipeline_stages]]
start_epoch = 100
name = "full_multitask"
awesome_loss_weight = 0.75
vad_loss_weight = 0.30
vad_speech_loss_weight = 0.35

[[loss.pipeline_stages]]
start_epoch = 130
name = "gan_integration"
awesome_loss_weight = 0.65
vad_loss_weight = 0.24
vad_speech_loss_weight = 0.24

[loss.awesome]
loss_weight = 0.8
mask_sharpness = 5.0
warmup_steps = 2500
proxy_enabled = false

[loss.mrstft]
factor = 0.35
gamma = 0.7
f_complex = 0.15
fft_sizes = [512, 1024, 2048]
hop_sizes = [128, 256, 512]

[gan]
enabled = true
start_epoch = 130
ramp_epochs = 24
adv_weight = 0.08
fm_weight = 0.6
discriminator = "combined"
mpd_periods = [2, 3, 5, 7, 11]
msd_scales = 3
disc_lr = 2e-5
disc_weight_decay = 0.01
disc_grad_clip = 1.0
disc_update_freq = 2
disc_max_samples = 24000
mpd_channels = 16
msd_channels = 64
cache_gen_waveforms = true
disc_gradient_checkpoint = true
gen_gradient_checkpoint = true
eval_frequency = 6

[vad]
loss_weight = 0.3
threshold = 0.05
margin = 0.05
speech_loss_weight = 0.30
warmup_epochs = 5
snr_gate_db = -12.0
snr_gate_width = 6.0
band_low_hz = 300.0
band_high_hz = 3400.0
z_threshold = 0.0
z_slope = 1.0

[vad.eval]
mode = "silero"
every = 2
batches = 24
max_seconds = 0.0
silero_sample_rate = 16000

[vad.train]
prob = 0.1
every_steps = 2

[metrics]
eval_sisdr = false

[debug]
verbose = false
sync_mode = "fast"
debug_numerics = false
debug_numerics_fail_fast = true
debug_numerics_every = 1
debug_numerics_dump_dir = ""
debug_numerics_dump_arrays = false
debug_numerics_max_dumps = 5
nan_skip_batch = false

[enhance]
speech_boost_db = 4.0
speech_boost_threshold = 0.4
speech_boost_min_speech_ms = 250
speech_boost_min_silence_ms = 100
speech_boost_pad_ms = 30
speech_boost_ramp_ms = 8.0
speech_boost_peak_limit = 0.99
speech_boost_silero_sample_rate = 16000
