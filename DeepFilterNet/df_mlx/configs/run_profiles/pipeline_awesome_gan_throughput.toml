# Profile: Throughput-biased pipeline_awesome + GAN + Silero VAD eval
# Keeps core losses active while reducing monitoring/checkpoint overhead.

[training]
batch_size = 20
learning_rate = 0.0001
weight_decay = 0.0
warmup_epochs = 5
patience = 8
grad_accumulation_steps = 1
max_grad_norm = 1.0
eval_frequency = 40
fp16 = true

[dataloader]
num_workers = 8
prefetch_size = 24
use_mlx_data = true

[checkpoint]
save_strategy = "epoch"
validate_every = 2
checkpoint_batches = 400
check_chkpts = false
resume = false
resume_data = false

[loss]
dynamic_loss = "pipeline_awesome"

[loss.awesome]
loss_weight = 0.25
mask_sharpness = 6.0
warmup_steps = 1200
proxy_enabled = false

[loss.mrstft]
factor = 0.0
gamma = 1.0
f_complex = -1.0
fft_sizes = [512, 1024, 2048]
hop_sizes = []

[gan]
enabled = true
start_epoch = 8
ramp_epochs = 15
adv_weight = 0.04
fm_weight = 0.8
discriminator = "combined"
mpd_periods = [2, 3, 5, 7, 11]
msd_scales = 3
disc_lr = 0.0001
disc_weight_decay = 0.0
disc_grad_clip = 1.0
disc_update_freq = 1

[vad]
loss_weight = 0.03
threshold = 0.6
margin = 0.05
speech_loss_weight = 0.01
warmup_epochs = 4
snr_gate_db = -10.0
snr_gate_width = 6.0
band_low_hz = 300.0
band_high_hz = 3400.0
z_threshold = 0.0
z_slope = 1.0

[vad.eval]
mode = "silero"
every = 2
batches = 4
max_seconds = 0.0
silero_model_path = ""
silero_sample_rate = 16000

[vad.train]
prob = 0.0
every_steps = 8

[debug]
verbose = true
