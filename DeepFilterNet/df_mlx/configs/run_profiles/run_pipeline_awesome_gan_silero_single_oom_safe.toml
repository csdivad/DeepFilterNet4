# OOM-safe variant of run_pipeline_awesome_gan_silero_single.toml
# Tuned for safer GAN activation on Apple Silicon by reducing peak memory pressure.
# Optimized for minimal sync barriers during GAN training (see perf(gan) commit).
#
# Usage:
#   python -m df_mlx.train_dynamic \
#     --run-config DeepFilterNet/df_mlx/configs/run_profiles/run_pipeline_awesome_gan_silero_single_oom_safe.toml

[dataset]
cache_dir = "/Users/andrew/DataDump/datasets/mlx_datastore"

[training]
epochs = 100
batch_size = 12
learning_rate = 1e-6
weight_decay = 0.0
warmup_epochs = 5
patience = 10
grad_accumulation_steps = 2
max_grad_norm = 0.8
# Leave eval_frequency at default (10) so sync_mode="fast" can override to 50.
# During GAN epochs, gan.eval_frequency caps it further (see [gan] section).
fp16 = true
seed = 42

[dataloader]
num_workers = 8
prefetch_size = 12
use_mlx_data = true

[checkpoint]
checkpoint_dir = "/Users/andrew/DataDump/checkpoints/gan_from_40"
save_strategy = "epoch"
validate_every = 1
checkpoint_batches = 200
check_chkpts = false
resume = true
resume_data = true

[model]
backbone_type = "attention"
variant = "full"

[loss]
dynamic_loss = "pipeline_awesome"

[loss.awesome]
loss_weight = 0.4
mask_sharpness = 6.0
warmup_steps = 2000
proxy_enabled = false

[loss.mrstft]
factor = 0.2
gamma = 0.7
f_complex = 0.15
fft_sizes = [512, 1024, 2048]
hop_sizes = [128, 256, 512]

[gan]
enabled = true
start_epoch = 20
ramp_epochs = 12
adv_weight = 0.06
fm_weight = 1.0
discriminator = "combined"
mpd_periods = [2, 3, 5, 7, 11]
msd_scales = 3
disc_lr = 1e-5
disc_weight_decay = 0.01
disc_grad_clip = 1.0
disc_update_freq = 2
disc_max_samples = 48000    # crop waveforms to 1s for discriminator (saves ~4x memory)
mpd_channels = 16           # halved from default 32 for OOM safety
msd_channels = 64           # halved from default 128 for OOM safety
# --- Sync barrier optimizations ---
cache_gen_waveforms = true   # reuse gen-path waveforms for disc (avoids redundant iSTFT)
single_eval = true           # merge gen+disc mx.eval() into one call (1 barrier vs 2)
eval_frequency = 4           # eval every 4th GAN step (caps training.eval_frequency during GAN)
                             # Higher = fewer syncs = faster, but delays OOM/NaN detection.
                             # Safe range: 2-8. Use 2 if you see OOM from graph accumulation.

[vad]
loss_weight = 0.05
threshold = 0.1
margin = 0.05
speech_loss_weight = 0.01
warmup_epochs = 5
snr_gate_db = -10.0
snr_gate_width = 6.0
band_low_hz = 300.0
band_high_hz = 3400.0
z_threshold = 0.0
z_slope = 1.0

[vad.eval]
mode = "silero"
every = 2
batches = 4
max_seconds = 0.0
silero_sample_rate = 16000

[vad.train]
prob = 0.01
every_steps = 4

[metrics]
eval_sisdr = false

[debug]
verbose = false
sync_mode = "fast"           # Uses eval_frequency=50 for pre-GAN epochs (max throughput)
debug_numerics = false
debug_numerics_fail_fast = true
debug_numerics_every = 1
debug_numerics_dump_dir = ""
debug_numerics_dump_arrays = false
debug_numerics_max_dumps = 5
nan_skip_batch = false

[enhance]
speech_boost_db = 5.0
speech_boost_threshold = 0.5
speech_boost_min_speech_ms = 250
speech_boost_min_silence_ms = 100
speech_boost_pad_ms = 30
speech_boost_ramp_ms = 8.0
speech_boost_peak_limit = 0.99
speech_boost_silero_sample_rate = 16000
