# MLX train_dynamic INI (train.py-style) example
#
# This file is consumed by:  python -m df_mlx.train_dynamic --train-config train.ini
# It maps a subset of train.py-style INI keys to the MLX RunConfig + model settings.
#
# Precedence (lowest -> highest): defaults < train.ini < run_config.toml < CLI flags
# Notes:
# - Section names and keys are case-insensitive.
# - Comma-separated lists are supported for *_SNRS, *_GAINS, FFT_SIZES, HOP_SIZES, etc.
# - Unsupported sections/keys are ignored with a warning.

# -----------------------------
# [df] Core audio/STFT settings
# -----------------------------
[df]
# Sample rate in Hz
SR = 48000
# FFT size in samples
FFT_SIZE = 960
# Hop size in samples
HOP_SIZE = 480
# ERB band count
NB_ERB = 32
# DF bins (0..NB_DF)
NB_DF = 96
# Deep filter order
DF_ORDER = 5
# DF lookahead frames
DF_LOOKAHEAD = 0
# Minimum frequency bins per ERB band
MIN_NB_ERB_FREQS = 2
# Local SNR clipping range (dB)
LSNR_MIN = -15
LSNR_MAX = 35

# ------------------------------------
# [train] Training schedule + dataloader
# ------------------------------------
[train]
# Training epochs
MAX_EPOCHS = 100
# Batch size
BATCH_SIZE = 12
# Data loader worker processes
NUM_WORKERS = 6
# Prefetch batches per worker
NUM_PREFETCH_BATCHES = 18
# Segment length in seconds
MAX_SAMPLE_LEN_S = 5.0
# Random seed (applied to dataset + training if set)
SEED = 42
# Print detailed timing (maps to --verbose)
LOG_TIMINGS = false

# Data augmentation ranges (CSV)
# SNRs in dB; min/max are used to form the sampling range
DATALOADER_SNRS = -5, 0, 5, 10, 20, 40
# Gains in dB; min/max are used for both speech + noise gain ranges
DATALOADER_GAINS = -6, 0, 6

# GAN training is not supported by train_dynamic (warning if true)
# GAN training is supported by train_dynamic (disabled by default)
# Set GANLoss/FeatureMatchingLoss factors > 0 to activate losses.
GAN_ENABLED = false
# Start GAN training at this epoch (0-based)
GAN_START_EPOCH = 0
# Linearly ramp GAN weights over N epochs (0 = no ramp)
GAN_RAMP_EPOCHS = 0
# Discriminator type: combined | mpd | msd
DISCRIMINATOR_TYPE = combined
# MPD periods (CSV) for GAN discriminator
MPD_PERIODS = 2, 3, 5, 7, 11
# MSD scales for GAN discriminator
MSD_SCALES = 3
# Update discriminator every N steps
DISCRIMINATOR_UPDATE_FREQ = 1
# Discriminator optimizer settings
DISCRIMINATOR_LR = 1e-4
DISCRIMINATOR_WEIGHT_DECAY = 0.0
DISCRIMINATOR_GRAD_CLIP = 1.0

# -------------------------------
# [optim] Optimizer configuration
# -------------------------------
[optim]
# Base learning rate
LR = 1e-6
# Minimum learning rate for cosine decay (0 disables floor)
LR_MIN = 1e-7
# Warmup epochs
WARMUP_EPOCHS = 5
# Weight decay (L2), 0 disables
WEIGHT_DECAY = 0.0

# ---------------------------------
# [distortion] Augmentation controls
# ---------------------------------
[distortion]
# Reverb probability (0-1)
P_REVERB = 0.15
# Clipping probability (0-1)
P_CLIPPING = 0.05
# Bandwidth extension probability (0-1)
P_BANDWIDTH_EXT = 0.05
# Interfering speech probability (0-1)
P_INTERFER_SPEECH = 0.15
# Alias supported by train.py (maps to P_INTERFER_SPEECH)
P_INTERFER_SP = 0.15

# -----------------------------------------
# [deepfilternet4] Model architecture knobs
# -----------------------------------------
[deepfilternet4]
# Backbone: mamba | gru | attention
BACKBONE = attention
# Model variant: full | lite
MODEL_VARIANT = full

# Encoder conv stack
CONV_CH = 64
CONV_KERNEL = 1, 3
CONV_STRIDE = 1, 2

# Embedding network
EMB_HIDDEN_DIM = 256
EMB_NUM_LAYERS = 4

# DF head
DF_HIDDEN_DIM = 256
DF_NUM_LAYERS = 3
DF_ORDER = 5
DF_LOOKAHEAD = 0

# Mask post-filter
MASK_PF = false
PF_BETA = 0.02

# LSNR dropout (stochastic masking during training)
LSNR_DROPOUT = false
LSNR_DROPOUT_THRESHOLD = -10

# Mamba params (ignored for non-mamba backbones)
MAMBA_D_STATE = 16
MAMBA_D_CONV = 4
MAMBA_EXPAND = 2

# --------------------------------------------
# [MultiResSpecLoss] Speech-detail enhancement
# --------------------------------------------
# This is the primary "speech cleanup" loss for MLX training.
# Set factor > 0 to enable. Typical values:
# - factor: 0.3 to 1.0
# - gamma: 0.3 to 1.0 (0.5 for stronger detail)
# - factor_complex: 0.1 to 0.5 (phase-sensitive)
# - fft_sizes/hop_sizes: multi-res analysis settings
[MultiResSpecLoss]
factor = 0.6
gamma = 0.5
factor_complex = 0.25
fft_sizes = 512, 1024, 2048
# Optional; if omitted, hop_size defaults to fft_size // 4 per entry
hop_sizes = 128, 256, 512

# ------------------------------------
# [loss] Legacy compatibility (optional)
# ------------------------------------
# These mirror older train.py loss keys; prefer MultiResSpecLoss.
[loss]
MULTI_RES_STFT_F = 0.0
MULTI_RES_STFT_GAMMA = 1.0

# -------------------------------
# Advanced loss sections
# -------------------------------
# GANLoss + FeatureMatchingLoss are supported by train_dynamic.
# Remaining sections are ignored with a warning if present.
[MaskLoss]
factor = 0

[SpectralLoss]
factor_magnitude = 0
factor_complex = 0

[ASRLoss]
factor = 0
factor_lm = 0

[GANLoss]
# Adversarial loss weight for generator (0 disables GAN)
factor = 0.0
# Only hinge loss is supported in MLX
type = hinge

[FeatureMatchingLoss]
# Feature matching loss weight (0 disables FM)
factor = 0.0

[SpeakerLoss]
factor = 0
